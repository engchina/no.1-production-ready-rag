# parser は独立マイクロサービス化している(services/parsers/<name>)。
# backend / ingestion-worker は重い parser 依存を持たず、取込時に各 parser サービスへ
# HTTP 委譲する(未達時は local / Enterprise AI VLM へ安全に fallback)。
# CPU parser(docling/marker/unstructured)は既定起動、GPU parser(unlimited_ocr/mineru/dots_ocr/glm_ocr)は
# `--profile gpu` で opt-in する。
# 注意: 各 GPU parser は GPU を 1 枚ずつ予約する。`--profile gpu` は全 GPU parser を起動するため
# 複数 GPU ホスト向け。単一 GPU では engine 個別 profile(`--profile mineru` 等)で 1 つだけ起動する。
# unlimited-ocr / dots-ocr / glm-ocr は推論サーバー(SGLang/vLLM)を同一イメージへ内包する単一サービス。

x-parser-service-urls: &parser-service-urls
  RAG_PARSER_DOCLING_SERVICE_URL: http://parser-docling:8000
  RAG_PARSER_MARKER_SERVICE_URL: http://parser-marker:8000
  RAG_PARSER_UNSTRUCTURED_SERVICE_URL: http://parser-unstructured:8000
  RAG_PARSER_UNLIMITED_OCR_SERVICE_URL: http://parser-unlimited-ocr:8000
  RAG_PARSER_MINERU_SERVICE_URL: http://parser-mineru:8000
  RAG_PARSER_DOTS_OCR_SERVICE_URL: http://parser-dots-ocr:8000
  RAG_PARSER_GLM_OCR_SERVICE_URL: http://parser-glm-ocr:8000
  # OCI クラウド parser(薄いプロキシ・`--profile oci` で opt-in)。
  RAG_PARSER_OCI_GENAI_VISION_SERVICE_URL: http://parser-oci-genai-vision:8000
  RAG_PARSER_OCI_DOCUMENT_UNDERSTANDING_SERVICE_URL: http://parser-oci-document-understanding:8000
  # 前処理(parse 前の原本変換)マイクロサービス。1 変換 = 1 独立サービス。
  RAG_PREPROCESS_OFFICE_TO_PDF_SERVICE_URL: http://preprocess-office-to-pdf:8000
  RAG_PREPROCESS_PDF_TO_PAGE_IMAGES_SERVICE_URL: http://preprocess-pdf-to-page-images:8000
  RAG_PREPROCESS_CSV_TO_JSON_SERVICE_URL: http://preprocess-csv-to-json:8000
  RAG_PREPROCESS_EXCEL_TO_JSON_SERVICE_URL: http://preprocess-excel-to-json:8000

# HuggingFace の DL ミラー/認証を各モデル parser へ供給する。
# - build 時(焼き込み)はミラーのみ渡す。token は image 履歴へ残さないため build-arg にしない
#   (gated モデルの焼き込みが必要なら BuildKit secret を使う)。
# - runtime(実行時 DL)は token + ミラーの両方を env で渡す。
# 値は backend のサービス制御が subprocess env で注入する(空なら公式 hub・匿名 DL)。
# HF_ENDPOINT は空文字を渡すと huggingface_hub がそれをリテラル endpoint として採用し、
# scheme 無し URL(httpx.UnsupportedProtocol)で DL が失敗する。未設定/空のときは公式 hub を
# 既定にする(`:-` は空も未設定扱い)。ミラー利用時はその値で上書きされる。
x-hf-build-args: &hf-build-args
  HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}
x-hf-env: &hf-env
  HF_TOKEN: ${HF_TOKEN:-}
  HF_ENDPOINT: ${HF_ENDPOINT:-https://huggingface.co}

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      additional_contexts:
        backend_core: ../no.1-production-ready-platform/packages/backend_core
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      <<: *parser-service-urls
      # コンテナ運用は prod モード(サービスの起動/停止は docker compose 経由)。
      ENVIRONMENT: prod
      LD_LIBRARY_PATH: /u01/aipoc/instantclient_23_26
      LOCAL_STORAGE_DIR: /u01/production-ready-rag
      MODEL_SETTINGS_FILE: /u01/production-ready-rag/model-settings.json
      OCI_CONFIG_FILE: /home/appuser/.oci/config
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
      RAG_PARSER_SERVICE_TIMEOUT_SECONDS: ${RAG_PARSER_SERVICE_TIMEOUT_SECONDS:-1230}
      # 取込は専用ワーカーへ切り出す。API プロセスはキュー投入のみ行い、
      # event loop を取込処理で塞がない。
      INGESTION_QUEUE_DEDICATED_WORKER_ENABLED: "true"
      INGESTION_QUEUE_INPROCESS_WORKER_ENABLED: "false"
      # readiness 画面は parser サービスの /health で導入状況・version を表示する。
      RAG_PARSER_READINESS_PROBE_ENABLED: "true"
      # 前処理マイクロサービスへの委譲を有効化(profile は既定 passthrough のまま)。
      RAG_PREPROCESS_ENABLED: "true"
      # サービス管理画面: 既定は稼働状態の可視化のみ(/api/services は各 /health を集約)。
      # 画面から起動/停止(docker compose 制御)も使う場合は、backend から docker CLI を
      # 実行できるようにした上で RAG_SERVICE_CONTROL_ENABLED: "true" を設定する。
      # コンテナ運用では docker socket + docker CLI のマウントが必要(下記コメント参照)。
      # RAG_SERVICE_CONTROL_ENABLED: "true"
    ports:
      - "8000:8000"
    # サービス管理画面から起動/停止を行う場合のみ、docker socket と compose ファイルを
    # backend へマウントする(既定はコメントアウト=可視化のみで socket 非公開)。
    #   - /var/run/docker.sock:/var/run/docker.sock
    #   - ./docker-compose.yml:/app/docker-compose.yml:ro
    # OCI 設定は権限調整済みの named volume に一度だけ seed して使う。
    volumes:
      - /u01/aipoc/instantclient_23_26:/u01/aipoc/instantclient_23_26:ro
      - oci-config:/home/appuser/.oci
      - backend-local-storage:/u01/production-ready-rag
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/ready', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 3

  ingestion-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      additional_contexts:
        backend_core: ../no.1-production-ready-platform/packages/backend_core
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      <<: *parser-service-urls
      ENVIRONMENT: prod
      LD_LIBRARY_PATH: /u01/aipoc/instantclient_23_26
      LOCAL_STORAGE_DIR: /u01/production-ready-rag
      MODEL_SETTINGS_FILE: /u01/production-ready-rag/model-settings.json
      OCI_CONFIG_FILE: /home/appuser/.oci/config
      INGESTION_QUEUE_DEDICATED_WORKER_ENABLED: "true"
      INGESTION_QUEUE_WORKER_CONCURRENCY: ${INGESTION_QUEUE_WORKER_CONCURRENCY:-2}
      INGESTION_QUEUE_PROCESS_ISOLATION_ENABLED: "false"
      RAG_PARSER_SERVICE_TIMEOUT_SECONDS: ${RAG_PARSER_SERVICE_TIMEOUT_SECONDS:-1230}
      # 前処理マイクロサービスへの委譲を有効化(profile は既定 passthrough のまま)。
      RAG_PREPROCESS_ENABLED: "true"
    # 取込キューを消費する専用ワーカープロセス。水平スケールは replicas を増やす
    # （claim_ingestion_job の row lock で同一ジョブの二重実行は起きない）。
    command:
      - sh
      - -c
      - "exec uv run --no-sync python -m app.rag.ingestion_worker"
    healthcheck:
      disable: true
    volumes:
      - /u01/aipoc/instantclient_23_26:/u01/aipoc/instantclient_23_26:ro
      - oci-config:/home/appuser/.oci
      - backend-local-storage:/u01/production-ready-rag

  # ---- 前処理マイクロサービス(CPU・既定起動、1 変換 = 1 独立サービス)----
  # parse の前に原本を変換する。未達時は backend が passthrough へ安全に縮退する。
  preprocess-office-to-pdf:
    build:
      context: .
      dockerfile: services/preprocess/office_to_pdf/Dockerfile
    restart: unless-stopped

  preprocess-pdf-to-page-images:
    build:
      context: .
      dockerfile: services/preprocess/pdf_to_page_images/Dockerfile
    restart: unless-stopped

  preprocess-csv-to-json:
    build:
      context: .
      dockerfile: services/preprocess/csv_to_json/Dockerfile
    restart: unless-stopped

  preprocess-excel-to-json:
    build:
      context: .
      dockerfile: services/preprocess/excel_to_json/Dockerfile
    restart: unless-stopped

  preprocess-url-to-markdown:
    build:
      context: .
      dockerfile: services/preprocess/url_to_markdown/Dockerfile
    restart: unless-stopped

  preprocess-image-enhance:
    build:
      context: .
      dockerfile: services/preprocess/image_enhance/Dockerfile
    restart: unless-stopped

  preprocess-pii-redact:
    build:
      context: .
      dockerfile: services/preprocess/pii_redact/Dockerfile
    restart: unless-stopped

  # ---- parser マイクロサービス(CPU・既定起動)----
  parser-docling:
    build:
      context: .
      dockerfile: services/parsers/docling/Dockerfile
      args: *hf-build-args
    environment: *hf-env
    restart: unless-stopped

  parser-marker:
    build:
      context: .
      dockerfile: services/parsers/marker/Dockerfile
      args: *hf-build-args
    environment: *hf-env
    restart: unless-stopped

  parser-unstructured:
    build:
      context: .
      dockerfile: services/parsers/unstructured/Dockerfile
    restart: unless-stopped

  # ---- parser マイクロサービス(GPU・`--profile gpu` で opt-in)----
  parser-unlimited-ocr:
    profiles: ["gpu", "unlimited-ocr"]
    build:
      context: .
      dockerfile: services/parsers/unlimited_ocr/Dockerfile
      args: *hf-build-args
    environment:
      <<: *hf-env
      UNLIMITED_OCR_RUNTIME: ${UNLIMITED_OCR_RUNTIME:-sglang}
      UNLIMITED_OCR_MODEL_ID: ${UNLIMITED_OCR_MODEL_ID:-baidu/Unlimited-OCR}
      UNLIMITED_OCR_SGLANG_MODEL: ${UNLIMITED_OCR_SGLANG_MODEL:-Unlimited-OCR}
      UNLIMITED_OCR_SGLANG_ATTENTION_BACKEND: ${UNLIMITED_OCR_SGLANG_ATTENTION_BACKEND:-flashinfer}
      UNLIMITED_OCR_SGLANG_MEM_FRACTION_STATIC: ${UNLIMITED_OCR_SGLANG_MEM_FRACTION_STATIC:-0.8}
      UNLIMITED_OCR_SGLANG_TIMEOUT_SECONDS: ${UNLIMITED_OCR_SGLANG_TIMEOUT_SECONDS:-1200}
      UNLIMITED_OCR_DEVICE: ${UNLIMITED_OCR_DEVICE:-cuda:0}
      UNLIMITED_OCR_TORCH_DTYPE: ${UNLIMITED_OCR_TORCH_DTYPE:-bfloat16}
      UNLIMITED_OCR_DPI: ${UNLIMITED_OCR_DPI:-300}
      UNLIMITED_OCR_PDF_BATCH_SIZE: ${UNLIMITED_OCR_PDF_BATCH_SIZE:-2}
      UNLIMITED_OCR_PDF_TIMEOUT_SECONDS: ${UNLIMITED_OCR_PDF_TIMEOUT_SECONDS:-1200}
      HF_HUB_DOWNLOAD_TIMEOUT: ${HF_HUB_DOWNLOAD_TIMEOUT:-120}
      HF_HUB_ETAG_TIMEOUT: ${HF_HUB_ETAG_TIMEOUT:-30}
      GUNICORN_TIMEOUT: ${UNLIMITED_OCR_GUNICORN_TIMEOUT:-1260}
    restart: unless-stopped
    ipc: host
    shm_size: "32g"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]

  parser-mineru:
    profiles: ["gpu", "mineru"]
    build:
      context: .
      dockerfile: services/parsers/mineru/Dockerfile
      args: *hf-build-args
    environment: *hf-env
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]

  parser-dots-ocr:
    # Dots.OCR は vLLM(OpenAI 互換)と parser FastAPI を **単一イメージ/単一コンテナ**で
    # 起動する(従来の parser + vLLM sidecar の 2 サービスを統合)。parser は localhost の
    # vLLM(イメージ既定の DOTS_OCR_IP/PORT)へ OCR を委譲する。
    profiles: ["gpu", "dots-ocr"]
    build:
      context: .
      dockerfile: services/parsers/dots_ocr/Dockerfile
      args: *hf-build-args
    # vLLM の共有メモリ要件(--shm-size 相当)。
    ipc: host
    environment:
      <<: *hf-env
      DOTS_OCR_GPU_MEMORY_UTILIZATION: ${DOTS_OCR_GPU_MEMORY_UTILIZATION:-0.9}
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]

  parser-glm-ocr:
    # GLM-OCR は vLLM(OpenAI 互換)と parser FastAPI を **単一イメージ/単一コンテナ**で
    # 起動する(従来の parser + vLLM sidecar の 2 サービスを統合)。GLM_OCR_VLLM_BASE_URL は
    # イメージ既定の localhost を使う。
    profiles: ["gpu", "glm-ocr"]
    build:
      context: .
      dockerfile: services/parsers/glm_ocr/Dockerfile
      args: *hf-build-args
    # vLLM の共有メモリ要件(--shm-size 相当)。
    ipc: host
    environment:
      <<: *hf-env
      GLM_OCR_GPU_MEMORY_UTILIZATION: ${GLM_OCR_GPU_MEMORY_UTILIZATION:-0.9}
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]

  parser-asr:
    profiles: ["gpu", "asr"]
    build:
      context: .
      dockerfile: services/parsers/asr/Dockerfile
      args: *hf-build-args
    environment: *hf-env
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]

  # ---- parser マイクロサービス(OCI クラウド・`--profile oci` で opt-in)----
  # OCI を呼ぶ薄いプロキシ(GPU 不要)。OCI 認証はメイン backend と同じ backend/.env と
  # ~/.oci マウントを継承する(個別設定なし)。
  parser-oci-genai-vision:
    profiles: ["oci"]
    build:
      context: .
      dockerfile: services/parsers/oci_genai_vision/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      OCI_CONFIG_FILE: /home/appuser/.oci/config
      # backend の _compose_env が起動時に注入する実効モデル設定(model-settings.json 由来を含む)。
      # environment は env_file より優先され、これが正本になる。
      OCI_ENTERPRISE_AI_ENDPOINT: ${OCI_ENTERPRISE_AI_ENDPOINT:-}
      OCI_ENTERPRISE_AI_API_KEY: ${OCI_ENTERPRISE_AI_API_KEY:-}
      OCI_ENTERPRISE_AI_PROJECT_OCID: ${OCI_ENTERPRISE_AI_PROJECT_OCID:-}
      OCI_ENTERPRISE_AI_VLM_MODEL: ${OCI_ENTERPRISE_AI_VLM_MODEL:-}
      OCI_ENTERPRISE_AI_DEFAULT_MODEL: ${OCI_ENTERPRISE_AI_DEFAULT_MODEL:-}
      OCI_ENTERPRISE_AI_VLM_PATH: ${OCI_ENTERPRISE_AI_VLM_PATH:-/responses}
      OCI_ENTERPRISE_AI_LLM_PATH: ${OCI_ENTERPRISE_AI_LLM_PATH:-/responses}
      OCI_ENTERPRISE_AI_VLM_INPUT_MODE: ${OCI_ENTERPRISE_AI_VLM_INPUT_MODE:-files_api}
    volumes:
      - oci-config:/home/appuser/.oci

  parser-oci-document-understanding:
    profiles: ["oci"]
    build:
      context: .
      dockerfile: services/parsers/oci_document_understanding/Dockerfile
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      OCI_CONFIG_FILE: /home/appuser/.oci/config
    volumes:
      - oci-config:/home/appuser/.oci

  # ---- pipeline ステージのプラグイン(マイクロサービス)----
  pipeline-chunking:
    build:
      context: .
      dockerfile: services/pipeline/chunking/Dockerfile
    restart: unless-stopped

  pipeline-vector-index:
    build:
      context: .
      dockerfile: services/pipeline/vector_index/Dockerfile
    restart: unless-stopped

  pipeline-graphrag:
    build:
      context: .
      dockerfile: services/pipeline/graphrag/Dockerfile
    restart: unless-stopped

  pipeline-generation:
    build:
      context: .
      dockerfile: services/pipeline/generation/Dockerfile
    restart: unless-stopped

  pipeline-guardrail:
    build:
      context: .
      dockerfile: services/pipeline/guardrail/Dockerfile
    restart: unless-stopped

  pipeline-agentic:
    build:
      context: .
      dockerfile: services/pipeline/agentic/Dockerfile
    restart: unless-stopped

  pipeline-grounding:
    build:
      context: .
      dockerfile: services/pipeline/grounding/Dockerfile
    restart: unless-stopped

  pipeline-evaluation:
    build:
      context: .
      dockerfile: services/pipeline/evaluation/Dockerfile
    restart: unless-stopped

  pipeline-retrieval:
    build:
      context: .
      dockerfile: services/pipeline/retrieval/Dockerfile
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-local-storage:
  oci-config:
