name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # full history を走査して過去コミットの混入も検出する
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # pre-commit hook と同一の設定/ルールで走査する
          GITLEAKS_CONFIG: .gitleaks.toml
          # OSS リポジトリ向けライセンスは不要(private の場合のみ要設定)
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: no.1-production-ready-rag/backend
    steps:
      # backend は共有 production-ready-backend-core（platform repo の sibling パス）に
      # 依存するため、platform を sibling に checkout してから uv sync する。
      # （配布へ切替後はこの sibling checkout を削除できる。）
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: no.1-production-ready-rag

      - name: Checkout shared platform packages
        uses: actions/checkout@v4
        with:
          repository: engchina/no.1-production-ready-platform
          ref: main
          path: no.1-production-ready-platform
          token: ${{ secrets.SHARED_UI_REPO_TOKEN || github.token }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: no.1-production-ready-rag/backend/uv.lock

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Format check
        run: uv run black --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy .

      - name: Test
        run: uv run pytest --cov=app

      - name: Security scan
        run: uv run bandit -r app

      - name: Dependency audit
        run: uv run pip-audit

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: no.1-production-ready-rag/frontend
    steps:
      # アプリと共有 UI パッケージを sibling に並べ、frontend の
      # file:../../no.1-production-ready-platform/packages/ui を CI でも解決できるようにする。
      # （GitHub Packages へ切替後はこの sibling checkout / build を削除し、npm ci のみにする。
      #  docs: no.1-production-ready-platform/docs/consume-in-ci.md）
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: no.1-production-ready-rag

      - name: Checkout shared UI package
        uses: actions/checkout@v4
        with:
          repository: engchina/no.1-production-ready-platform
          ref: main
          path: no.1-production-ready-platform
          # private repo の場合は read 権限の PAT を SHARED_UI_REPO_TOKEN に設定する。
          # public repo なら既定の GITHUB_TOKEN で checkout 可。
          token: ${{ secrets.SHARED_UI_REPO_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            no.1-production-ready-rag/frontend/package-lock.json
            no.1-production-ready-platform/package-lock.json

      - name: Build shared UI package
        working-directory: no.1-production-ready-platform
        run: |
          npm ci
          npm run build

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit test
        run: npm test

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: Build
        run: npm run build

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E test
        run: npm run test:e2e

  compose:
    name: Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        run: docker compose config
