[project]
name = "rag-parser-core"
version = "0.1.0"
description = "Shared parser contract (schemas + remap) for backend and parser microservices"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.11",
    "charset-normalizer>=3.4,<4",
    # oci_enterprise_ai(共有 VLM/LLM core)が OpenAI 互換 transport に使う。
    "httpx>=0.27",
]

[project.optional-dependencies]
# parser マイクロサービスが共通 FastAPI app factory(service.py)を使うための extra。
# core 本体の依存は軽量に保ち、HTTP サーバ依存はこの extra に隔離する。
service = [
    "fastapi>=0.121,<1.0",
    "uvicorn[standard]>=0.37",
    "gunicorn>=23,<24",
    "python-multipart>=0.0.20",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rag_parser_core"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.mypy]
python_version = "3.12"
strict = true
plugins = ["pydantic.mypy"]
