[project]
name = "rag-pipeline-core"
version = "0.1.0"
description = "Shared pipeline-stage plugin contract (schemas + deterministic logic + app factory) for backend and pipeline microservices"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.11",
    "rag-parser-core",
]

[project.optional-dependencies]
# pipeline ステージマイクロサービスが共通 FastAPI app factory を使うための extra。
# core 本体の依存は軽量(pydantic + rag-parser-core)に保つ。
service = [
    "fastapi>=0.121,<1.0",
    "uvicorn[standard]>=0.37",
    "gunicorn>=23,<24",
]

[tool.uv.sources]
rag-parser-core = { path = "../rag_parser_core", editable = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rag_pipeline_core"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
