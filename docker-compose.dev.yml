# dev(backend をホストで uv 起動)向けの compose override。
#
# dev では backend はホストプロセス、parser マイクロサービス(重い ML/CUDA 依存)は
# コンテナで動かす。ホストの backend が各 parser の /health・/parse を叩けるよう、
# コンテナの 8000 を localhost の dev_port(catalog の ServiceCatalogEntry.dev_port)へ公開する。
#
# サービス管理画面(dev)は内部で次を実行する:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d <service_id>
# GPU(mineru/dots_ocr)は base 側の profiles:["gpu"] を継承するため --profile gpu が併用される。
#
# 軽量な前処理(preprocess-*)は dev ではホストの uv プロセスで起動するため、ここでは公開しない。
services:
  parser-docling:
    ports:
      - "127.0.0.1:8020:8000"

  parser-marker:
    ports:
      - "127.0.0.1:8021:8000"

  parser-unstructured:
    ports:
      - "127.0.0.1:8022:8000"

  parser-mineru:
    ports:
      - "127.0.0.1:8023:8000"

  parser-dots-ocr:
    ports:
      - "127.0.0.1:8024:8000"

  parser-glm-ocr:
    ports:
      - "127.0.0.1:8025:8000"

  parser-asr:
    ports:
      - "127.0.0.1:8026:8000"
